name: Build and Upload to Artifactory

on:
  schedule:
    - cron:  '0 * * * *'
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout maven plugin repository
        uses: actions/checkout@v3
        with:
          repository: Unicorn-Samples/example-maven-plugin
          ref: master
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v1
        with:
          java-version: 14

      - name: Build with Maven
        run: |
          mvn install

      - name: Checkout this repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 14

      - name: Build with Maven
        run: mvn clean install

      - name: Upload to Artifactory
        uses: jfrog/setup-jfrog-cli@v1

      - name: Configure Artifactory
        run: |
          jfrog rt c --url ${{ secrets.ARTIFACTORY_URL }} --access-token ${{ secrets.ARTIFACTORY_ACCESS_TOKEN }}

      - name: Upload JAR to Artifactory
        run: |
          jfrog rt u "target/*.jar" my-artifactory-repository