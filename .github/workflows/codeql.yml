name: "CodeQL"

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python' ]
        # Learn more:
        # https://docs.github.com/en/free-pro-team@latest/github/finding-security-vulnerabilities-and-errors-in-your-code/configuring-code-scanning#changing-the-languages-that-are-analyzed

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        repository: Unicorn-Samples/example-maven-plugin
        ref: master
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: 14

    - name: Build with Maven
      run: |
        mvn install

    - name: Checkout this repository
      uses: actions/checkout@v3

    - name: Set up JDK 1.14
      uses: actions/setup-java@v5
      with:
        java-version: 1.14

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Build with Maven
      run: mvn package

#   This repo fails to use the Autobuild from CodeQL
#    - name: Autobuild
#      uses: Anthophila/codeql-action/codeql/autobuild@master

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - uses: actions/upload-artifact@v4
      with:
        name: bookstore-v3-1.0.0-SNAPSHOT-shaded.jar
        path: $GITHUB_WORKSPACE/target/*.jar

    - uses: actions/download-artifact@v4
    - name: Display structure of downloaded files
      run: ls -R
